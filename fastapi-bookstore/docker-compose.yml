version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookstore_database
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  liquibase:
    image: liquibase/liquibase
    depends_on:
      - mysql
    volumes:
      - ${PWD}/db/changelog/:/liquibase/changelog
    environment:
      INSTALL_MYSQL: true
    command: >
      --changeLogFile=./db.changelog-1.0.yaml
      --url=jdbc:mysql://mysql:3306/bookstore_database
      --driver=com.mysql.cj.jdbc.Driver
      --classpath=/liquibase/changelog
      --username=admin
      --password=admin
      update

volumes:
  mysql_data:
